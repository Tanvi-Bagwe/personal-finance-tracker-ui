<app-header></app-header>
<div class="login-container">
  <mat-card class="mat-card-width-400">

    @if (step() === 1) {
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your email to receive a 6-digit OTP code.</p>

      <form (submit)="onRequestOtp()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" placeholder="email@example.com" required>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width-btn" [disabled]="isLoading()">
          {{ isLoading() ? 'Sending...' : 'Send OTP' }}
        </button>
      </form>
    }

    @else {
      <h2>Verify OTP</h2>
      <p class="subtitle">Check your inbox for the code sent to <b>{{ email() }}</b></p>

      <form (submit)="onResetPassword()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>6-Digit OTP</mat-label>
          <input matInput [(ngModel)]="otp" name="otp" maxlength="6" placeholder="123456" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>New Password</mat-label>
          <input matInput type="password" [(ngModel)]="newPassword" name="newPassword" required>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary" class="full-width-btn" [disabled]="isLoading()">
            {{ isLoading() ? 'Resetting...' : 'Update Password' }}
          </button>

          <button mat-button type="button" (click)="step.set(1)" [disabled]="isLoading()">
            Back
          </button>
        </div>
      </form>
    }
  </mat-card>
</div>
