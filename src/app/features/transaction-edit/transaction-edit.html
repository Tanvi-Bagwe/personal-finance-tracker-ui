<h2 mat-dialog-title>Edit Transaction</h2>
<mat-dialog-content>
  <div class="edit-form">
    <mat-form-field appearance="outline">
      <mat-label>Amount (€)</mat-label>
      <input matInput type="number" [(ngModel)]="data.transaction.amount">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Category</mat-label>
      <mat-select [(ngModel)]="data.transaction.category_id">
        @for (cat of data.categories; track cat.id){
          <mat-option [value]="cat.id">
            {{cat.name}}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date</mat-label>
      <input matInput type="date" [(ngModel)]="data.transaction.date">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <input matInput [(ngModel)]="data.transaction.description">
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()">Update</button>
</mat-dialog-actions>
