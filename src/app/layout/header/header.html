<mat-toolbar color="primary" class="header">
  @if (appStore.isLoggedIn()){
    <button mat-icon-button (click)="appStore.toggleSidebar()">
      <mat-icon>menu</mat-icon>
    </button>
  }

  <h1 class="sidebar-app-name">Finance Tracker</h1>

  <span class="spacer"></span>

  <button mat-icon-button (click)="appStore.toggleTheme()">
    <mat-icon>{{ appStore.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
