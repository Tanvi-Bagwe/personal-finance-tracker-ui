<div class="sidebar-container" [class.sidebar-is-mobile]="isMobile()">
  <app-header></app-header>

  <mat-sidenav-container class="sidebar-sidenav-container"
                         [style.marginTop.px]="isMobile() ? 56 : 0">
    <mat-sidenav #snav [mode]="isMobile() ? 'over' : 'side'"
                 [fixedInViewport]="isMobile()" fixedTopGap="56" [opened]="appStore.isSidebarOpen()"
                 (closed)="appStore.isSidebarOpen.set(false)">
      <mat-nav-list>

        <a mat-list-item routerLink="categories">Categories</a>
        <a mat-list-item routerLink="transactions">Transactions</a>

      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
