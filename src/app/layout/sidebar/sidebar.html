<div class="sidebar-container" [class.sidebar-is-mobile]="isMobile()">
  <mat-toolbar color="primary" class="sidebar-toolbar">
    <button mat-icon-button (click)="snav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <h1 class="sidebar-app-name">Finance Tracker</h1>
    <span class="spacer"></span>
    <!-- Toggle button for later -->
    <button mat-icon-button (click)="toggleDarkMode()">
      <mat-icon>{{ darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
  </mat-toolbar>

  <mat-sidenav-container class="sidebar-sidenav-container"
                         [style.marginTop.px]="isMobile() ? 56 : 0">
    <mat-sidenav #snav [mode]="isMobile() ? 'over' : 'side'"
                 [fixedInViewport]="isMobile()" fixedTopGap="56">
      <mat-nav-list>
        @for (nav of fillerNav; track nav) {
          <a mat-list-item>{{ nav }}</a>
        }
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      Hello
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
